<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المرشد الأسري والتربوي الذكي</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h1>المرشد الذكي</h1>
                <button class="new-chat-btn" id="newChatBtn">
                    <span>+</span> استشارة جديدة
                </button>
            </div>
            
            <div class="chat-history">
                <p class="history-label">المحادثات السابقة</p>
                <div id="historyList">
                    </div>
            </div>

            <div class="sidebar-footer">
                <button class="clear-all-btn" id="clearAllBtn">مسح السجل كاملاً</button>
            </div>
        </aside>

        <main class="chat-area">
            <header class="chat-header">
                <div class="status-info">
                    <h2>جلسة استشارية</h2>
                    <div class="online-indicator">
                        <span class="dot"></span> متصل الآن
                    </div>
                </div>
                <button class="menu-toggle" id="menuToggle">☰</button>
            </header>

            <div class="messages-container" id="messagesContainer">
                <div class="message bot">أهلاً بك في فضاء المرشد الأسري. كيف يمكنني مساعدتك اليوم؟</div>
            </div>

            <div class="input-section">
                <div class="suggestions">
                    <button onclick="quickSend('كيف أتعامل مع عناد طفلي؟')">عناد الطفل</button>
                    <button onclick="quickSend('تنظيم وقت الدراسة')">وقت الدراسة</button>
                    <button onclick="quickSend('بناء الثقة بالنفس')">الثقة بالنفس</button>
                </div>
                <div class="input-wrapper">
                    <input type="text" id="userInput" placeholder="اسأل المرشد التربوي...">
                    <button id="sendBtn">إرسال</button>
                </div>
                <p class="disclaimer">ذكاء اصطناعي للمساعدة التربوية</p>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
